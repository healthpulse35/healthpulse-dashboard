<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Training Overview · HealthPulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body, #root { min-height: 100%; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
</style>
<script>
  // Apply the saved theme before React mounts so the page doesn't flash
  // the wrong palette on first paint.
  (function () {
    var t = "dark";
    try { var s = localStorage.getItem("hp_theme_v1"); if (s === "light" || s === "dark") t = s; } catch (e) {}
    var bg = t === "light" ? "#f5f7fa" : "#0a0d12";
    var fg = t === "light" ? "#0f1722" : "#e6eaf0";
    document.documentElement.style.background = bg;
    document.body && (document.body.style.background = bg);
    document.body && (document.body.style.color = fg);
    var s = document.createElement("style");
    s.textContent = "html,body,#root{background:" + bg + ";color:" + fg + ";}input[type=date]{color-scheme:" + (t === "light" ? "light" : "dark") + ";}";
    document.head.appendChild(s);
  })();
</script>
</head>
<body>
<div id="root">
  <div style="padding:24px;color:#7c8696">Loading dashboard…</div>
</div>
<script type="module">
// Read the token from the URL (`?t=…`) and fetch live data from the Edge
// Function. The token is never stored in this file — it comes from
// whoever opens the page (bookmarked URL contains it).
const API = "https://ptisuvfdufngdfxfrzvn.supabase.co/functions/v1/dashboard";
const params = new URLSearchParams(location.search);
const token = params.get("t") || params.get("token") || "";
if (!token) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#f87171">Missing ?t=&lt;DASHBOARD_TOKEN&gt; in URL.</div>';
} else {
  fetch(`${API}?token=${encodeURIComponent(token)}`)
    .then(async (r) => {
      if (!r.ok) {
        const body = await r.text().catch(() => "");
        throw new Error(`HTTP ${r.status}: ${body || r.statusText}`);
      }
      return r.json();
    })
    .then(async (data) => {
      window.__DASHBOARD_DATA__ = data;
      // Bucket cache-busting by the day's UTC date — fresh module on a new
      // day without hammering the server every page load. New deploys within
      // the same day still land within ~10 min when GH Pages' default
      // Cache-Control expires.
      const ver = new Date().toISOString().slice(0, 10);
      await import(`./client.js?v=${ver}`);
    })
    .catch((err) => {
      document.getElementById("root").innerHTML =
        `<div style="padding:24px;color:#f87171">Failed to load data: ${String(err.message || err)}</div>`;
    });
}
</script>
</body>
</html>
